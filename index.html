    <!--
      Structured data: Person entity. This is the highest-leverage SEO element here —
      it tells Google "Dharsan Kesavan" is a real entity with a title, school, and
      verified profiles, which is what drives ranking + knowledge panels for a name query.
      `sameAs` should list ONLY identity profiles (omit GitHub/X until those URLs exist).
    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Dharsan Kesavan",
        "url": "https://dharsankesavan.com/",
        "image": "https://dharsankesavan.com/portrait.jpg",
        "jobTitle": "Bioengineer & Software Builder",
        "description": "Bioengineer and software builder working at the seam between life science and systems software — from a Rust-core spaced-repetition app to an ML-driven drug-interaction engine.",
        "alumniOf": {
          "@type": "CollegeOrUniversity",
          "name": "Arizona State University"
        },
        "address": {
          "@type": "PostalAddress",
          "addressRegion": "Arizona",
          "addressCountry": "US"
        },
        "knowsAbout": [
          "Bioengineering",
          "Biomedical Sciences",
          "Software Engineering",
          "Rust",
          "Swift",
          "Machine Learning",
          "Spaced Repetition",
          "Drug Interaction Analysis"
        ],
        "sameAs": [
          "https://www.linkedin.com/in/dharsan-kesavan-22927a285/"
        ]
      }
    </script>
