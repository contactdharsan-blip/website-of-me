      builder of Avorio + BioPath — all reconciled by absolute @id. That linkage is what drives
      ranking, knowledge panels, and correct AI attribution for the name query.

        • `dateModified` below is refreshed to the build date by scripts/prerender.mjs.
        • `sameAs` lists ONLY identity profiles. GitHub/X are omitted until those URLs exist

          socials[] is an ARTICLE, not an identity page, so it lives in the Article node, not sameAs.
    -->
